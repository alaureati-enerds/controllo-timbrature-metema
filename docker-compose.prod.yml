# Compose di PRODUZIONE (compatibile anche con docker-compose v1).
# Tre processi applicativi (web, worker, migrate) dalla stessa immagine, più
# Postgres. Niente Mailpit (è solo per lo sviluppo).
#
# Con docker-compose v1 (quello col trattino), usa SEMPRE --env-file e -p per
# isolare lo stack di produzione da quello di sviluppo:
#
#   docker-compose --env-file .env.production -p controllo-timbrature-metema-prod -f docker-compose.prod.yml up -d --build
#
# Con docker compose v2:
#
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Vedi docs/deploy-docker.md per la procedura completa e gli aggiornamenti.
version: '2.2'

services:
  postgres:
    image: postgres:16
    container_name: controllo-timbrature-metema-db-prod
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ evita l'interpolazione di compose: le variabili le espande la shell
      # DENTRO il container, dove postgres le ha impostate da env_file.
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Nessuna porta esposta sull'host: il DB è raggiungibile solo dalla rete
    # interna del compose (web/worker/migrate vi accedono come host "postgres").

  # Servizio one-shot: applica migration + seed (idempotente). Web e worker lo
  # fanno anche loro in autonomia all'avvio, quindi questo servizio è puramente
  # esplicito (utile per `docker-compose run migrate`).
  migrate:
    build: .
    image: controllo-timbrature-metema:prod
    env_file: .env.production
    container_name: controllo-timbrature-metema-migrate
    command: sh -c "npm run db:deploy && npm run db:seed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    image: controllo-timbrature-metema:prod
    env_file: .env.production
    container_name: controllo-timbrature-metema-web
    command: sh -c "npm run db:deploy && npm run db:seed && npm run start"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  worker:
    build: .
    image: controllo-timbrature-metema:prod
    env_file: .env.production
    container_name: controllo-timbrature-metema-worker
    command: sh -c "npm run db:deploy && npm run db:seed && npm run worker"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    restart: unless-stopped

volumes:
  pgdata:
  storage:
